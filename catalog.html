<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>카탈로그 · 3D Maintenance Site</title>
<link rel="stylesheet" href="assets/style.css" />
</head>
<body>
<header class="site-header">
  <div class="brand">3D Maintenance Site</div>
  <nav>
    <a href="index.html">홈</a>
    <a href="catalog.html">카탈로그</a>
    <a href="#" id="adminToggle">관리자 모드</a>
  </nav>
</header>

<main>
  <div class="layout">
    <div class="sidebar" id="categoryFilters"></div>

    <div style="flex:1;">
      <input type="search" id="searchInput" placeholder="부품명 검색" style="margin-bottom:12px;" />

      <div id="addPanel" style="display:none; margin-bottom:16px; padding:12px; border:1px dashed var(--border); border-radius:var(--radius);">
        <div class="form-row">
          <label>이름</label>
          <input type="text" id="newName" placeholder="예: 4도어 냉장고" />
        </div>
        <div class="form-row">
          <label>카테고리</label>
          <select id="newCategory"></select>
        </div>
        <button class="primary" id="addBtn">추가</button>
        <p class="hint" id="addStatus"></p>
      </div>

      <div class="card-grid" id="grid">
        <p class="hint">불러오는 중...</p>
      </div>
    </div>
  </div>
</main>

<dialog id="pwDialog">
  <p style="margin-top:0; font-size:14px;">관리자 비밀번호</p>
  <input type="password" id="pwInput" placeholder="비밀번호" />
  <p class="error-text" id="pwError" style="display:none;">비밀번호가 올바르지 않습니다.</p>
  <div style="display:flex; gap:8px; margin-top:12px; justify-content:flex-end;">
    <button id="pwCancel">취소</button>
    <button class="primary" id="pwSubmit">확인</button>
  </div>
</dialog>

<script type="module">
  import { db } from "./assets/firebase.js";
  import { ref, get, push, set } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-database.js";
  import { CATEGORIES, renderItemCard, isAdmin, tryUnlockAdmin, lockAdmin } from "./assets/common.js";

  const params = new URLSearchParams(location.search);
  let activeCategory = params.get("cat") || "전체";
  let allItems = [];

  const filtersEl = document.getElementById("categoryFilters");
  const gridEl = document.getElementById("grid");
  const searchInput = document.getElementById("searchInput");
  const adminToggle = document.getElementById("adminToggle");
  const addPanel = document.getElementById("addPanel");
  const newCategory = document.getElementById("newCategory");

  newCategory.innerHTML = CATEGORIES.map((c) => `<option value="${c}">${c}</option>`).join("");

  function renderFilters() {
    const all = ["전체", ...CATEGORIES];
    filtersEl.innerHTML = all.map((cat) =>
      `<button class="filter-btn ${cat === activeCategory ? "active" : ""}" data-cat="${cat}">${cat}</button>`
    ).join("");
    filtersEl.querySelectorAll(".filter-btn").forEach((btn) => {
      btn.addEventListener("click", () => {
        activeCategory = btn.dataset.cat;
        renderFilters();
        renderGrid();
      });
    });
  }

  function renderGrid() {
    const query = searchInput.value.trim().toLowerCase();
    const filtered = allItems.filter(([, item]) => {
      const matchesCat = activeCategory === "전체" || item.category === activeCategory;
      const matchesQuery = !query || (item.name || "").toLowerCase().includes(query);
      return matchesCat && matchesQuery;
    });
    gridEl.innerHTML = filtered.length
      ? filtered.map(([id, item]) => renderItemCard(id, item)).join("")
      : `<p class="hint">해당 조건의 모델이 없어요.</p>`;
  }

  async function loadItems() {
    try {
      const snap = await get(ref(db, "appliances"));
      const data = snap.val() || {};
      allItems = Object.entries(data);
      renderGrid();
    } catch (err) {
      gridEl.innerHTML = `<p class="error-text">데이터를 불러오지 못했습니다: ${err.message}</p>`;
    }
  }

  searchInput.addEventListener("input", renderGrid);
  renderFilters();
  loadItems();

  // --- admin gate ---
  const pwDialog = document.getElementById("pwDialog");
  const pwInput = document.getElementById("pwInput");
  const pwError = document.getElementById("pwError");

  function refreshAdminUI() {
    const unlocked = isAdmin();
    adminToggle.textContent = unlocked ? "관리자 모드 끄기" : "관리자 모드";
    addPanel.style.display = unlocked ? "block" : "none";
  }
  refreshAdminUI();

  adminToggle.addEventListener("click", (e) => {
    e.preventDefault();
    if (isAdmin()) {
      lockAdmin();
      refreshAdminUI();
    } else {
      pwError.style.display = "none";
      pwInput.value = "";
      pwDialog.showModal();
    }
  });

  document.getElementById("pwCancel").addEventListener("click", () => pwDialog.close());
  document.getElementById("pwSubmit").addEventListener("click", async () => {
    const ok = await tryUnlockAdmin(pwInput.value);
    if (ok) {
      pwDialog.close();
      refreshAdminUI();
    } else {
      pwError.style.display = "block";
    }
  });

  // --- add new appliance ---
  document.getElementById("addBtn").addEventListener("click", async () => {
    const name = document.getElementById("newName").value.trim();
    const category = newCategory.value;
    const statusEl = document.getElementById("addStatus");
    if (!name) {
      statusEl.textContent = "이름을 입력해주세요.";
      return;
    }
    try {
      const newRef = push(ref(db, "appliances"));
      await set(newRef, { name, category, glbUrl: "", procedure: "", updatedAt: Date.now() });
      location.href = `detail.html?id=${encodeURIComponent(newRef.key)}`;
    } catch (err) {
      statusEl.textContent = `추가 실패: ${err.message}`;
    }
  });
</script>
</body>
</html>
